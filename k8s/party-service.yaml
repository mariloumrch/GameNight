apiVersion: apps/v1
kind: Deployment
metadata:
  name: party-service
  labels:
    app: party-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: party-service
  template:
    metadata:
      labels:
        app: party-service
    spec:
      containers:
        - name: party-service
          image: gamenight/party-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka-server:8761/eureka"
---
apiVersion: v1
kind: Service
metadata:
  name: party-service
spec:
  selector:
    app: party-service
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP
